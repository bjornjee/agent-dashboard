title: agent-dashboard
description: A tmux-integrated TUI and mobile web companion for monitoring and controlling Claude Code agents
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

url: https://bjornjee.github.io
baseurl: /agent-dashboard

permalink: pretty

aux_links:
  GitHub: https://github.com/bjornjee/agent-dashboard

nav_external_links:
  - title: Releases
    url: https://github.com/bjornjee/agent-dashboard/releases

color_scheme: agent-dark

search_enabled: true
search:
  heading_level: 3

back_to_top: true
back_to_top_text: "Back to top"

footer_content: "MIT License. Built with <a href=\"https://just-the-docs.com\">just-the-docs</a>."

ga_tracking:
ga_tracking_anonymize_ip: true

callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
