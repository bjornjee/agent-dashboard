title: agent-dashboard
description: A tmux-integrated TUI and mobile web companion for monitoring and controlling Claude Code agents
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

url: https://bjornjee.github.io
baseurl: /agent-dashboard

permalink: pretty

color_scheme: agent-dashboard-dark

breadcrumbs: true

callouts:
  tip:
    title: Tip
    color: cyan
  warning:
    title: Warning
    color: amber
  note:
    title: Note
    color: grey

search_enabled: true
search:
  heading_level: 3

back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  "GitHub":
    - "https://github.com/bjornjee/agent-dashboard"
aux_links_new_tab: true

footer_content: ""

defaults:
  - scope:
      path: ""
    values:
      layout: default

ga_tracking:
ga_tracking_anonymize_ip: true
