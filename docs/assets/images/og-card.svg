<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#232634"/>
      <stop offset="1" stop-color="#303446"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ca9ee6"/>
      <stop offset="1" stop-color="#8caaee"/>
    </linearGradient>
    <style>
      .title { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; }
      .body  { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; }
      .mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent strip -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>

  <!-- Top-left: tmux-pane glyph (three coloured dots) -->
  <g transform="translate(80, 80)">
    <circle cx="0"  cy="0" r="9" fill="#e78284"/>
    <circle cx="28" cy="0" r="9" fill="#e5c890"/>
    <circle cx="56" cy="0" r="9" fill="#a6d189"/>
    <text x="92" y="6" class="mono" font-size="22" fill="#a5adce">~/.agent-dashboard</text>
  </g>

  <!-- Brand mark + name -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#accent)"/>
    <text x="14" y="40" class="title" font-size="34" fill="#232634">A</text>
    <text x="80" y="44" class="title" font-size="56" fill="#c6d0f5">agent-dashboard</text>
  </g>

  <!-- Tagline -->
  <text x="80" y="340" class="title" font-size="44" fill="#c6d0f5">Dispatch &amp; orchestrate Claude Code</text>
  <text x="80" y="396" class="title" font-size="44" fill="#c6d0f5">agents from terminal and phone.</text>

  <!-- Feature pills -->
  <g transform="translate(80, 470)">
    <g transform="translate(0, 0)">
      <rect width="220" height="56" rx="28" fill="#414559"/>
      <circle cx="32" cy="28" r="6" fill="#a6d189"/>
      <text x="56" y="36" class="body" font-size="20" fill="#c6d0f5">tmux-native</text>
    </g>
    <g transform="translate(240, 0)">
      <rect width="290" height="56" rx="28" fill="#414559"/>
      <circle cx="32" cy="28" r="6" fill="#8caaee"/>
      <text x="56" y="36" class="body" font-size="20" fill="#c6d0f5">workflow gates</text>
    </g>
    <g transform="translate(550, 0)">
      <rect width="270" height="56" rx="28" fill="#414559"/>
      <circle cx="32" cy="28" r="6" fill="#ca9ee6"/>
      <text x="56" y="36" class="body" font-size="20" fill="#c6d0f5">mobile remote</text>
    </g>
  </g>

  <!-- URL bottom-right -->
  <text x="1120" y="585" text-anchor="end" class="mono" font-size="22" fill="#a5adce">bjornjee.github.io/agent-dashboard</text>
</svg>
