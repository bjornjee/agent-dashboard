# Agent Dashboard settings
# Copy to ~/.agent-dashboard/settings.toml (or $AGENT_DASHBOARD_DIR/settings.toml).
# Any missing keys fall back to the defaults shown below.

[banner]
show_mascot   = true   # show the axolotl pixel art
show_quote    = true   # show the daily quote

[notifications]
enabled       = false  # enable desktop notifications from adapter hooks
sound         = false  # play alert sound on attention events
silent_events = false  # show notification for non-alerting stops

[debug]
key_log       = false  # write key/mouse/focus events to debug-keys.log

[experimental]
ascii_pet     = false  # show animated ASCII pet in the left panel
dino_game     = false  # enable Chrome-style dino runner game (Shift+G)

[usage]
rate_limit_poll_seconds = 60  # how often to fetch rate limits from Anthropic API (0 = disable)

[effort]
# Thinking-effort levels the dashboard pins on agents launched from the
# New Agent flow. The agent-state-fast hook swaps to `plan` when the agent
# enters plan mode (EnterPlanMode) and restores `default` on exit. Both
# values flow into the same /effort slash command Claude Code accepts;
# valid levels are minimal | low | medium | high | max.
plan    = "high"  # level used while permission_mode='plan'
default = "high"  # level pinned at spawn and restored on plan exit

[harness]
# Active coding-agent harness. Choose the binary that backs new agents.
#   "claude" — Claude Code (default; uses ~/.claude config)
#   "pi"     — pi-mono coding agent (uses ~/.pi config; supports OpenAI/codex
#              models via unified LLM API)
default = "claude"

[harness.pi]
# Pi-mono spawn knobs — only consulted when [harness] default = "pi".
# Provider+Model flow into `pi --provider <p> --model <m>`. Either being
# empty inherits pi-mono's resolution chain (auth.json > env var). Configure
# the OpenAI key in ~/.pi/auth.json. See:
# https://github.com/badlogic/pi-mono/blob/main/packages/coding-agent/docs/providers.md
provider = ""   # e.g. "openai"
model    = ""   # e.g. "openai-codex/gpt-5.5"
