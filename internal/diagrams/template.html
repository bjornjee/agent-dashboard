<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    --base:     #1e1e2e;
    --surface:  #313244;
    --overlay:  #45475a;
    --text:     #f5f5ff;
    --subtext:  #a6adc8;
    --lavender: #b4befe;
    --mauve:    #cba6f7;
    --sapphire: #74c7ec;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--base);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "SF Pro Text", sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 0.9rem 1.5rem;
    background: rgba(30, 30, 46, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--overlay);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  header h1 {
    font-size: 0.95rem;
    font-weight: 600;
    margin: 0;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  header .badge {
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--base);
    background: var(--lavender);
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  header .spacer { flex: 1; }
  header .toolbar {
    display: flex;
    gap: 0.35rem;
    align-items: center;
  }
  header .toolbar button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--overlay);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  header .toolbar button:hover {
    background: var(--overlay);
    border-color: var(--lavender);
  }
  header .toolbar .zoom-pct {
    font-size: 0.72rem;
    color: var(--subtext);
    min-width: 3.2rem;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  main {
    padding: 2rem 1.5rem 4rem;
    display: flex;
    /* `safe center` degrades to flex-start when the child overflows the
       container. Without `safe`, flex centering pushes wide content off
       the left edge of the scroll region so the user can never reach
       the leftmost part of a zoomed-in diagram. */
    justify-content: safe center;
    /* Allow the flex item to grow past the viewport width so horizontal
       scrollbars appear on <body> when the zoomed diagram is wider. */
    min-width: min-content;
  }
  .diagram-card {
    display: inline-block;
    padding: 2rem;
    background: var(--surface);
    border: 1px solid var(--overlay);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  }
  body.grabbing, body.grabbing * { cursor: grabbing !important; }
  .diagram-card pre.mermaid {
    margin: 0;
    background: transparent;
    text-align: center;
    font-size: 20px;
    line-height: 1.5;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
  }
  /* ── Nodes: thick bright border, darker interior for contrast with text ── */
  .diagram-card pre.mermaid svg .node rect,
  .diagram-card pre.mermaid svg .node polygon,
  .diagram-card pre.mermaid svg .node circle,
  .diagram-card pre.mermaid svg .node ellipse,
  .diagram-card pre.mermaid svg .node path,
  .diagram-card pre.mermaid svg .actor,
  .diagram-card pre.mermaid svg rect.actor {
    stroke-width: 4px !important;
    stroke: #a5b4fc !important;   /* bright indigo border */
    fill: #1e213a !important;     /* deep indigo interior */
  }
  /* Cluster (subgraph) boxes: distinct treatment so nested structures read. */
  .diagram-card pre.mermaid svg .cluster rect {
    stroke-width: 3px !important;
    stroke: #7c83b8 !important;
    fill: rgba(30, 33, 58, 0.45) !important;
    rx: 8 !important;
    ry: 8 !important;
  }
  /* Edges + arrows: thick, bright, unmistakable at any zoom. */
  .diagram-card pre.mermaid svg .edgePath .path,
  .diagram-card pre.mermaid svg .flowchart-link,
  .diagram-card pre.mermaid svg .messageLine0,
  .diagram-card pre.mermaid svg .messageLine1,
  .diagram-card pre.mermaid svg line.loopLine,
  .diagram-card pre.mermaid svg .transition {
    stroke-width: 3px !important;
    stroke: #cbd5ff !important;
    fill: none !important;
  }
  .diagram-card pre.mermaid svg marker path,
  .diagram-card pre.mermaid svg .arrowheadPath,
  .diagram-card pre.mermaid svg defs marker path {
    fill: #cbd5ff !important;
    stroke: #cbd5ff !important;
  }
  /* ── Text: bold glyphs. We deliberately do NOT force a fill color here
     because classDef nodes may have light fills (yellow warn, cream note,
     light pink) where white text is unreadable. Mermaid's theme engine
     picks a text color appropriate for each node's fill — we let it.
     The halo is what gives us readability across all backgrounds: a
     translucent dark outline is nearly invisible on dark backgrounds
     and reads as a soft shadow on light ones, boosting contrast in
     both directions without flipping the text color. */
  .diagram-card pre.mermaid svg .nodeLabel,
  .diagram-card pre.mermaid svg .edgeLabel,
  .diagram-card pre.mermaid svg .cluster-label,
  .diagram-card pre.mermaid svg .label,
  .diagram-card pre.mermaid svg text,
  .diagram-card pre.mermaid svg foreignObject div,
  .diagram-card pre.mermaid svg foreignObject span,
  .diagram-card pre.mermaid svg foreignObject p {
    font-weight: 700 !important;
    font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "SF Pro Text", sans-serif !important;
    font-variant-numeric: tabular-nums;
  }
  /* No halo here: runtime JS (tuneTextContrast) sets per-node text fill
     based on the actual shape fill luminance, which is more reliable than
     a halo trying to compensate for both dark and light backgrounds. */
  /* Edge labels: opaque dark chip + white text (we know this bg is dark). */
  .diagram-card pre.mermaid svg .edgeLabel rect,
  .diagram-card pre.mermaid svg .edgeLabel .label rect {
    fill: #0f1020 !important;
    background-color: #0f1020 !important;
  }
  .diagram-card pre.mermaid svg .edgeLabel foreignObject div {
    background-color: #0f1020 !important;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .diagram-card pre.mermaid svg .edgeLabel text,
  .diagram-card pre.mermaid svg .edgeLabel tspan,
  .diagram-card pre.mermaid svg .edgeLabel foreignObject div {
    fill: #f5f5ff !important;
    color: #f5f5ff !important;
  }
  /* Cluster labels sit on the semi-transparent dark cluster fill. */
  .diagram-card pre.mermaid svg .cluster text,
  .diagram-card pre.mermaid svg .cluster tspan,
  .diagram-card pre.mermaid svg .cluster-label text,
  .diagram-card pre.mermaid svg .cluster-label tspan {
    fill: #f5f5ff !important;
  }
  /* Node text color is set per-node by tuneTextContrast() at runtime —
     no static CSS override here so classDef/light-fill nodes get the
     right color instead of inheriting our default white. */
  /* ── Neutralize mermaid's pastel classDef defaults ──
     classDefs like `classDef error fill:#f99` (which produced the pink
     box in the previous screenshot) override our theme. Match them by
     the inline `fill="#..."` attribute mermaid writes and re-tint to
     match the dark palette while preserving the node's *semantic*
     color via a distinct accent hue. */
  .diagram-card pre.mermaid svg .node[class*="error"] rect,
  .diagram-card pre.mermaid svg .node[class*="fail"] rect,
  .diagram-card pre.mermaid svg g.node.error rect,
  .diagram-card pre.mermaid svg g.node.fail rect {
    stroke: #f38ba8 !important;   /* pink border, dark fill */
    fill: #2a1822 !important;
  }
  .diagram-card pre.mermaid svg .node[class*="warn"] rect,
  .diagram-card pre.mermaid svg g.node.warn rect {
    stroke: #f9e2af !important;
    fill: #2a2418 !important;
  }
  .diagram-card pre.mermaid svg .node[class*="success"] rect,
  .diagram-card pre.mermaid svg .node[class*="ok"] rect,
  .diagram-card pre.mermaid svg g.node.success rect {
    stroke: #a6e3a1 !important;
    fill: #172a1e !important;
  }
  /* The SVG sits inside a transform-wrapper that we scale on zoom.
     The wrapper's box dimensions track the scaled svg size so the
     page itself grows and the browser provides natural scrollbars —
     no internal scroll inside the card. */
  .zoom-wrap {
    display: inline-block;
    transform-origin: 0 0;
    /* No CSS transition: the zoom handler also adjusts window.scrollX/Y
       to keep the anchor point under the cursor, and an async transform
       transition drifts out of sync with the synchronous scroll update,
       making wheel- and button-zoom feel jittery. Instant application
       with small steps is visually smoother than a staggered animation. */
    will-change: transform;
  }
  .diagram-card pre.mermaid svg {
    display: block;
    margin: 0 auto;
    height: auto;
  }
  .help-hint {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    background: rgba(49, 50, 68, 0.94);
    border: 1px solid var(--overlay);
    border-radius: 8px;
    padding: 0.55rem 0.75rem;
    font-size: 0.7rem;
    color: var(--subtext);
    backdrop-filter: blur(8px);
    pointer-events: none;
    line-height: 1.5;
  }
  .help-hint kbd {
    color: var(--lavender);
    background: var(--base);
    border: 1px solid var(--overlay);
    border-radius: 4px;
    padding: 0 0.3rem;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.65rem;
  }
  footer {
    text-align: center;
    color: var(--subtext);
    font-size: 0.75rem;
    padding: 1.5rem 1rem 2rem;
  }
  footer code {
    color: var(--lavender);
    background: var(--surface);
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-size: 0.7rem;
  }
</style>
</head>
<body>
<header>
  <span class="badge">Diagram</span>
  <h1>{{TITLE}}</h1>
  <span class="spacer"></span>
  <div class="toolbar" role="toolbar" aria-label="Zoom controls">
    <button id="zoom-out" title="Zoom out (−)">−</button>
    <span class="zoom-pct" id="zoom-pct">100%</span>
    <button id="zoom-in" title="Zoom in (+)">+</button>
    <button id="zoom-reset" title="Reset zoom (0)">⟳</button>
  </div>
</header>
<main>
  <div class="diagram-card" id="card">
    <div class="zoom-wrap" id="zoom-wrap">
      <pre class="mermaid">{{SOURCE}}</pre>
    </div>
  </div>
</main>
<footer>Rendered locally by <code>agent-dashboard</code> · mermaid bundled · no network</footer>
<div class="help-hint">
  <kbd>+</kbd> / <kbd>−</kbd> zoom · <kbd>0</kbd> reset · <kbd>⌘</kbd>+scroll · drag to pan
</div>
<script src="{{MERMAID_JS}}"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'base',
    securityLevel: 'loose',
    fontFamily: 'ui-sans-serif, system-ui, -apple-system, sans-serif',
    themeVariables: {
      // Catppuccin Mocha-inspired palette tuned for high contrast on dark bg.
      background: '#313244',
      primaryColor: '#45475a',
      primaryTextColor: '#f5f5ff',
      primaryBorderColor: '#b4befe',
      secondaryColor: '#585b70',
      secondaryTextColor: '#f5f5ff',
      secondaryBorderColor: '#74c7ec',
      tertiaryColor: '#45475a',
      tertiaryTextColor: '#f5f5ff',
      tertiaryBorderColor: '#cba6f7',
      lineColor: '#f5f5ff',
      textColor: '#f5f5ff',
      mainBkg: '#45475a',
      nodeBorder: '#b4befe',
      nodeTextColor: '#f5f5ff',
      clusterBkg: '#1e1e2e',
      clusterBorder: '#585b70',
      titleColor: '#f5f5ff',
      edgeLabelBackground: '#313244',
      labelBackground: '#313244',
      labelTextColor: '#f5f5ff',
      // Sequence
      actorBkg: '#45475a',
      actorBorder: '#b4befe',
      actorTextColor: '#f5f5ff',
      actorLineColor: '#a6adc8',
      signalColor: '#f5f5ff',
      signalTextColor: '#f5f5ff',
      labelBoxBkgColor: '#313244',
      labelBoxBorderColor: '#b4befe',
      // Keep notes dark too — the default cream #f9e2af bleeds into
      // cylinder/storage shapes on some mermaid layouts and produces
      // illegible dark-on-light text.
      noteBkgColor: '#45475a',
      noteTextColor: '#f5f5ff',
      noteBorderColor: '#b4befe',
      // State / class
      altBackground: '#1e1e2e',
    },
    // htmlLabels:false makes mermaid emit SVG <text> elements instead of
    // foreignObject/<div>. SVG text honors primaryTextColor reliably and
    // renders crisper at zoom — the foreignObject path drops our color
    // overrides and produces the muddy text we saw in earlier screenshots.
    flowchart: { useMaxWidth: false, htmlLabels: false, curve: 'basis', padding: 24, nodeSpacing: 50, rankSpacing: 60 },
    sequence: { useMaxWidth: false, showSequenceNumbers: false, wrap: true },
    gantt:    { useMaxWidth: false },
  });

  // ─── Zoom + pan controls ───────────────────────────────────────────────
  // Pure-CSS transform on a wrapper around the rendered SVG. We never
  // touch the SVG itself so mermaid's layout stays untouched. The card
  // has no internal scrollbar — the wrap's box dimensions are kept in
  // sync with the scaled svg so the page itself grows and the browser
  // window provides the scrollbars.
  (function () {
    const wrap   = document.getElementById('zoom-wrap');
    const pctEl  = document.getElementById('zoom-pct');
    const btnIn  = document.getElementById('zoom-in');
    const btnOut = document.getElementById('zoom-out');
    const btnRst = document.getElementById('zoom-reset');

    const MIN = 0.1;
    const MAX = 4;
    // Smaller multiplicative step = finer-grained perceived smoothness
    // for button clicks and keyboard press-and-hold. 1.1 ≈ 10% per step.
    const STEP = 1.1;
    // Wheel zoom uses an even smaller step so trackpad/ctrl+scroll
    // feels continuous instead of jumping in big chunks.
    const WHEEL_STEP = 1.05;
    let zoom = 1;
    let fitDefault = 1; // computed once after first measure; used by reset
    let baseW = 0, baseH = 0;

    function measureBase() {
      const svg = wrap.querySelector('svg');
      if (!svg) return false;
      // Prefer the SVG's intrinsic viewBox / attributes — these are the
      // unscaled coordinates mermaid laid out at, independent of any
      // CSS or transform applied later. getBoundingClientRect is racy
      // because mermaid sizes the SVG asynchronously.
      let w = 0, h = 0;
      if (svg.viewBox && svg.viewBox.baseVal && svg.viewBox.baseVal.width > 0) {
        w = svg.viewBox.baseVal.width;
        h = svg.viewBox.baseVal.height;
      } else {
        const wAttr = parseFloat(svg.getAttribute('width')  || '0');
        const hAttr = parseFloat(svg.getAttribute('height') || '0');
        w = wAttr; h = hAttr;
      }
      if (!(w > 0 && h > 0)) {
        const r = svg.getBoundingClientRect();
        w = r.width / zoom;
        h = r.height / zoom;
      }
      baseW = w;
      baseH = h;
      return baseW > 0 && baseH > 0;
    }

    function apply() {
      wrap.style.transform = 'scale(' + zoom + ')';
      if (baseW && baseH) {
        wrap.style.width  = (baseW * zoom) + 'px';
        wrap.style.height = (baseH * zoom) + 'px';
      }
      pctEl.textContent = Math.round(zoom * 100) + '%';
    }
    function setZoom(z) {
      zoom = Math.max(MIN, Math.min(MAX, z));
      apply();
    }
    function zoomBy(factor, anchorX, anchorY) {
      // Zoom around an anchor point in viewport coords so the point
      // under the cursor stays put. We adjust window scroll because
      // the page (not the card) is what scrolls.
      const before = zoom;
      const next = Math.max(MIN, Math.min(MAX, before * factor));
      if (next === before) return;
      const ratio = next / before;
      const sx = window.scrollX, sy = window.scrollY;
      zoom = next;
      apply();
      window.scrollTo({
        left: (sx + anchorX) * ratio - anchorX,
        top:  (sy + anchorY) * ratio - anchorY,
        behavior: 'instant',
      });
    }
    function centerAnchor() {
      return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    }

    // Compute the zoom at which the diagram fills the viewport width.
    // We intentionally fit-by-width only (not min(width,height)) so tall
    // diagrams stay readable and scroll vertically, GitHub-style. Fitting
    // by the smaller of the two dimensions squashes tall flowcharts down
    // to ~10% in landscape windows, which makes node labels illegible.
    // Result is clamped to [MIN, 1.0]; we cap the upper bound at 1 so
    // narrow diagrams are shown at native size rather than blown up.
    function computeFitZoom() {
      if (!(baseW > 0)) return 1;
      // mainPaddingX (1.5rem * 2) + cardPadding (2rem * 2) = 112px
      // +20px slack for scrollbars / sub-pixel rounding so the diagram
      // is guaranteed to fit horizontally without producing overflow.
      const padX = 132;
      const availW = Math.max(1, window.innerWidth - padX);
      const fit = availW / baseW;
      return Math.max(MIN, Math.min(1, fit));
    }

    btnIn .addEventListener('click', () => { const a = centerAnchor(); zoomBy(STEP,   a.x, a.y); });
    btnOut.addEventListener('click', () => { const a = centerAnchor(); zoomBy(1/STEP, a.x, a.y); });
    btnRst.addEventListener('click', () => { setZoom(fitDefault); window.scrollTo(0, 0); });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.key === '+' || e.key === '=') {
        e.preventDefault();
        const a = centerAnchor(); zoomBy(STEP, a.x, a.y);
      } else if (e.key === '-' || e.key === '_') {
        e.preventDefault();
        const a = centerAnchor(); zoomBy(1/STEP, a.x, a.y);
      } else if (e.key === '0') {
        e.preventDefault();
        setZoom(1);
        window.scrollTo(0, 0);
      }
    });

    // Ctrl/Cmd + wheel zoom anchored at the cursor. We scale the factor
    // by |deltaY| so a single fast scroll tick zooms more than a slow
    // one — this matches the feel of native map/image viewers and lets
    // trackpad pinch gestures (which emit many small wheel events) feel
    // continuous instead of stair-stepping through discrete stops.
    window.addEventListener('wheel', (e) => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        // Clamp |deltaY| per tick so very large OS-reported deltas
        // (e.g. some trackpad drivers report 100+ per gesture tick)
        // don't warp multiple STEPs at once.
        const delta = Math.max(-50, Math.min(50, e.deltaY));
        const factor = Math.pow(WHEEL_STEP, -delta / 10);
        zoomBy(factor, e.clientX, e.clientY);
      }
    }, { passive: false });

    // Drag-to-pan via window scroll.
    let dragging = false;
    let startX = 0, startY = 0, startScrollX = 0, startScrollY = 0;
    window.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (e.target.closest('button')) return;
      dragging = true;
      startX = e.clientX;
      startY = e.clientY;
      startScrollX = window.scrollX;
      startScrollY = window.scrollY;
      document.body.classList.add('grabbing');
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      window.scrollTo(
        startScrollX - (e.clientX - startX),
        startScrollY - (e.clientY - startY)
      );
    });
    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      document.body.classList.remove('grabbing');
    });

    // ─── Per-node text contrast ────────────────────────────────────────
    // CSS can't know the actual fill color of a classDef-styled node, so
    // forcing white text globally breaks light-fill shapes (yellow warn,
    // cream note, light pink). Instead, after mermaid renders we walk
    // every .node, read its shape's computed fill, compute WCAG relative
    // luminance, and set the text fill to dark or light so contrast is
    // always readable regardless of what the source classDef specifies.
    function parseColorToRgb(s) {
      if (!s || s === 'none' || s === 'transparent') return null;
      const m = s.match(/rgba?\(([^)]+)\)/);
      if (m) {
        const parts = m[1].split(',').map(x => parseFloat(x.trim()));
        if (parts.length >= 3 && parts.every(n => !isNaN(n))) {
          // Treat fully-transparent as no color.
          if (parts.length === 4 && parts[3] === 0) return null;
          return [parts[0], parts[1], parts[2]];
        }
      }
      if (s[0] === '#') {
        let hex = s.slice(1);
        if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
        if (hex.length === 6) {
          return [parseInt(hex.slice(0, 2), 16),
                  parseInt(hex.slice(2, 4), 16),
                  parseInt(hex.slice(4, 6), 16)];
        }
      }
      return null;
    }
    // WCAG 2.x relative luminance, 0 (black) → 1 (white).
    function relLuminance(rgb) {
      const [r, g, b] = rgb.map(v => {
        const c = v / 255;
        return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }
    // WCAG contrast ratio between two luminances.
    function contrastRatio(la, lb) {
      const lo = Math.min(la, lb), hi = Math.max(la, lb);
      return (hi + 0.05) / (lo + 0.05);
    }
    function tuneTextContrast() {
      const DARK = '#0f1020';   // near-black with a hint of indigo
      const LIGHT = '#f5f5ff';  // near-white
      const lDark = relLuminance([15, 16, 32]);
      const lLight = relLuminance([245, 245, 255]);
      // Mermaid v11 ignores htmlLabels:false for flowchart and still
      // wraps node labels in <foreignObject><div><span class="nodeLabel">,
      // applying the theme color as an *inline style* on the span. We
      // override that inline style with setProperty(..., 'important')
      // based on the actual shape fill's luminance.
      const nodes = document.querySelectorAll('.diagram-card svg .node');
      nodes.forEach(node => {
        // Prefer the label-container rect that mermaid draws as the
        // shape's visual background; fall back to the first shape element.
        const shape = node.querySelector('rect.basic.label-container')
                   || node.querySelector('rect, polygon, circle, ellipse, path');
        if (!shape) return;
        const attrFill = shape.getAttribute('fill');
        const styleFill = shape.style && shape.style.fill;
        const computedFill = getComputedStyle(shape).fill;
        const rgb = parseColorToRgb(attrFill)
                 || parseColorToRgb(styleFill)
                 || parseColorToRgb(computedFill);
        if (!rgb) return;
        // Pick whichever of DARK/LIGHT has the higher WCAG contrast
        // ratio against the shape fill. This beats a naive luminance
        // threshold on mid-saturation colors (pink, orange, teal) where
        // both options look plausible but one is measurably more
        // readable. On a #f38ba8 pink this picks dark (6.6:1) over
        // white (2.3:1).
        const lShape = relLuminance(rgb);
        const isLight = contrastRatio(lShape, lDark) >= contrastRatio(lShape, lLight);
        const textColor = isLight ? DARK : LIGHT;
        // Override mermaid's inline theme color on every label element
        // inside this node — span.nodeLabel, its <p>/<div>, and any
        // native SVG text (used by sequence/state diagrams).
        const labelEls = node.querySelectorAll(
          '.nodeLabel, .nodeLabel p, .nodeLabel span, foreignObject div, foreignObject p, foreignObject span, text, tspan'
        );
        labelEls.forEach(el => {
          el.style.setProperty('color', textColor, 'important');
          el.style.setProperty('fill', textColor, 'important');
        });
        // Halo: dark text gets a light halo, light text gets a dark halo.
        // Only meaningful on native SVG text — foreignObject HTML ignores
        // paint-order — but it's cheap to set for both.
        const haloColor = isLight
          ? 'rgba(255,255,255,0.55)'
          : 'rgba(0,0,0,0.45)';
        node.querySelectorAll('text, tspan').forEach(t => {
          t.style.setProperty('paint-order', 'stroke fill', 'important');
          t.style.setProperty('stroke', haloColor, 'important');
          t.style.setProperty('stroke-width', '2.5px', 'important');
          t.style.setProperty('stroke-linejoin', 'round', 'important');
        });
      });
    }

    // Wait for mermaid to inject the SVG, then measure and apply.
    // mermaid v11 with startOnLoad:true renders on DOMContentLoaded;
    // we poll briefly because there's no public "rendered" event.
    // After the first successful measure we compute the fit-to-viewport
    // zoom and apply it as the default — that way wide diagrams open
    // fully visible instead of overflowing off-screen at 100%.
    function waitForSvg(attempt) {
      if (measureBase()) {
        tuneTextContrast();
        fitDefault = computeFitZoom();
        zoom = fitDefault;
        apply();
        window.scrollTo(0, 0);
        return;
      }
      if (attempt < 50) setTimeout(() => waitForSvg(attempt + 1), 40);
    }
    waitForSvg(0);

    // Recompute fit on window resize if the user is still at default
    // (haven't zoomed manually). This keeps the diagram fully visible
    // when the window is resized after open.
    let lastFit = null;
    window.addEventListener('resize', () => {
      if (Math.abs(zoom - fitDefault) > 0.001) return; // user has interacted
      const next = computeFitZoom();
      if (lastFit !== null && Math.abs(next - lastFit) < 0.001) return;
      lastFit = next;
      fitDefault = next;
      zoom = next;
      apply();
    });
  })();
</script>
</body>
</html>
